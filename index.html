<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RACEMENT 해운대 · 재고조회시스템</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FAF8F2; --surface:#FFFFFF;
    --ink:#0A0A0A; --ink-2:#3D3D3D; --muted:#8A8A8A;
    --line:#E8E3D5;
    --accent:#FF4D1F; --green:#10B981; --warn:#F59E0B;
    --cell-bg: #FFFFFF; --cell-border: #E0E0E0; --cell-text: #333333; --cell-sz: #666666;
    --cell-zero-bg: #F5F5F5; --cell-zero-border: #EEEEEE; --cell-zero-text: #BDBDBD;
    --cell-low-bg: #FFEBEE; --cell-low-border: #FFCDD2; --cell-low-text: #D32F2F;
  }
  :root.dark-mode {
    --bg: #121212; --surface: #1E1E1E; --ink: #F3F4F6; --ink-2: #9CA3AF; --muted: #6B7280; --line: #374151;
    --cell-bg: #1E1E1E; --cell-border: #374151; --cell-text: #F3F4F6; --cell-sz: #9CA3AF;
    --cell-zero-bg: #121212; --cell-zero-border: #1F2937; --cell-zero-text: #4B5563;
    --cell-low-bg: #451a1e; --cell-low-border: #7f1d1d; --cell-low-text: #fca5a5;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); color:var(--ink); transition: background 0.2s, color 0.2s; }
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:"tnum","zero"; letter-spacing:-.005em; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; }
  .card-hover:hover{ border-color:#0A0A0A; }
  .ipt{ border:1px solid var(--line); background:var(--surface); padding:.6rem .8rem; border-radius:10px; color:var(--ink); }
  .brutal{ border:2px solid var(--ink); border-radius:10px; box-shadow:3px 3px 0 0 var(--ink); }
  .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:999px; border:1px solid var(--line); background:var(--surface); font-weight:600; font-size:.82rem; cursor:pointer; }
  .chip[data-active="1"]{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .copyable { cursor: pointer; transition: opacity 0.1s; }
  .size-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; border-radius: 8px; background: var(--cell-bg); border: 1px solid var(--cell-border); color: var(--cell-text); }
  .size-cell .sz { font-size: 0.75rem; font-weight: 600; color: var(--cell-sz); }
  .size-cell .qty { font-size: 1.05rem; font-weight: 800; }
  .size-cell.zero { background: var(--cell-zero-bg); border-color: var(--cell-zero-border); }
  .size-cell.zero span { color: var(--cell-zero-text); text-decoration: line-through; }
  .size-cell.low { background: var(--cell-low-bg); border-color: var(--cell-low-border); color: var(--cell-low-text); }
  .fav-btn { cursor:pointer; color:var(--warn); }
  .modal-backdrop{ background:rgba(10,10,10,.55); backdrop-filter:blur(2px); }
  body.showroom-mode .real-qty { display: none !important; }
  body.showroom-mode .showroom-qty { display: inline !important; }
</style>
</head>
<body class="min-h-screen pb-20">

<header class="sticky top-0 z-30 no-print" style="background:var(--bg); border-bottom:1px solid var(--line);">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <svg class="block h-[38px] w-auto" viewBox="0 0 649 250" fill="currentColor"><use href="#rcm-logo"/></svg>
      <div class="min-w-0 leading-tight">
        <div class="mono text-[10px] tracking-[.18em] text-[color:var(--muted)]">HAEUNDAE · INVENTORY</div>
        <h1 class="text-base sm:text-lg font-extrabold truncate">해운대 재고조회시스템</h1>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="cartBtn" class="chip mono text-[11px] hidden" style="background:var(--accent); color:#fff; border:none;"><i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> 요청함 (<span id="cartCount">0</span>)</button>
      <button id="showroomBtn" class="chip mono text-[11px]"><i data-lucide="eye" class="w-3.5 h-3.5"></i>쇼룸</button>
      <button id="darkModeBtn" class="chip mono text-[11px]">🌙</button>
      <button id="refreshBtn" class="chip mono text-xs"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
      <button id="adminBtn" class="brutal mono font-black px-3 py-2 text-sm bg-[color:var(--surface)]">ADMIN</button>
    </div>
  </div>
</header>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 grid grid-cols-2 lg:grid-cols-4 gap-3">
  <div class="card p-3"><div class="mono text-[10px] text-[color:var(--muted)]">TOTAL ITEMS</div><div id="statItems" class="mt-1 text-2xl font-black">0</div></div>
  <div class="card p-3"><div class="mono text-[10px] text-[color:var(--muted)]">BUSAN STOCK</div><div id="statBusan" class="mt-1 text-2xl font-black text-[color:var(--accent)]">0</div></div>
  <div class="card p-3 min-w-0"><div class="mono text-[10px] text-[color:var(--muted)]">DATA SOURCE</div><div id="statSrc" class="mt-1 text-sm font-bold truncate">—</div></div>
</section>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-4">
  <div class="card p-3 sm:p-4">
    <input id="q" type="search" placeholder="품명, 품번 검색 (초성 지원)" class="ipt w-full font-bold" />
    <div id="recentSearches" class="hidden flex gap-1.5 mt-2 overflow-x-auto"></div>
    <div id="filterDetails" class="mt-3 flex flex-wrap gap-2">
      <button class="chip" data-cat="ALL" data-active="1">전체</button>
      <button class="chip" data-cat="신발">신발</button>
      <button class="chip" data-cat="의류">의류</button>
      <button class="chip" data-fav="1">★ 즐겨찾기</button>
      <button class="chip" data-stock="1">재고있음</button>
      <button id="resetAll" class="chip" style="color:var(--accent);">초기화</button>
      <div id="brandChips" class="flex flex-wrap gap-1.5"><button class="chip" data-brand="ALL" data-active="1">브랜드 전체</button></div>
    </div>
  </div>
</section>

<main id="results" class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 mb-6">
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
  <div id="emptyState" class="card p-12 text-center hidden">데이터가 없습니다.</div>
</main>

<div id="detailModal" class="hidden fixed inset-0 z-40 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[90vh] overflow-auto relative">
      <button id="closeDetail" class="absolute top-4 right-4 p-2"><i data-lucide="x"></i></button>
      <div id="detailHead"></div>
      <div id="detailBody"></div>
      <div id="cartUI" class="mt-4 p-3 rounded-lg border bg-[color:var(--bg)]">
        <div class="text-xs font-bold mb-2">🛒 타지점 이동 요청 담기</div>
        <div class="flex gap-2">
          <select id="cartSize" class="ipt flex-1 text-sm"></select>
          <input type="number" id="cartQty" class="ipt w-16 text-center" value="1" min="1">
          <button id="addCartBtn" class="brutal px-4 bg-black text-white font-black">담기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="cartModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[80vh] flex flex-col relative">
      <button id="closeCart" class="absolute top-4 right-4 p-2"><i data-lucide="x"></i></button>
      <h3 class="text-xl font-black mb-4">🛒 이동 요청 목록</h3>
      <div id="cartList" class="flex-1 overflow-y-auto border-y py-2 mb-4"></div>
      <div class="flex gap-2">
        <button id="clearCart" class="chip" style="color:var(--accent);">전체 삭제</button>
        <button id="copyExcelBtn" class="brutal flex-1 py-3 bg-green-600 text-white font-black">엑셀용 리스트 복사</button>
      </div>
    </div>
  </div>
</div>

<div id="adminModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-lg p-6">
      <div id="authPanel">
        <input id="pwd" type="password" class="ipt w-full mb-2" placeholder="비밀번호" />
        <button id="pwdGo" class="brutal w-full py-2 bg-black text-white font-black">UNLOCK</button>
      </div>
      <div id="uploadPanel" class="hidden">
        <button id="openSettings" class="text-xs mb-3 border px-2 py-1">설정 변경</button>
        <div id="drop" class="border-2 border-dashed p-10 text-center cursor-pointer bg-gray-50">엑셀 파일 클릭/드래그</div>
        <input id="file" type="file" class="hidden" accept=".xlsx,.xls,.csv" />
      </div>
      <div id="settingsPanel" class="hidden">
        <input id="ghOwner" class="ipt w-full mb-2" placeholder="GitHub 사용자명" />
        <input id="ghRepo" class="ipt w-full mb-2" placeholder="저장소 이름" />
        <input id="ghPat" type="password" class="ipt w-full mb-4" placeholder="PAT 토큰" />
        <button id="ghSave" class="brutal w-full py-2 bg-black text-white font-black">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
<script src="./images.js"></script>
</body>
</html>
