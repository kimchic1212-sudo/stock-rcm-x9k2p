<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RACEMENT 해운대 · 재고조회시스템</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FAF8F2; --surface:#FFFFFF;
    --ink:#0A0A0A; --ink-2:#3D3D3D; --muted:#8A8A8A;
    --line:#E8E3D5;
    --men:#1D4ED8; --women:#DB2777; --uni:#525252; --kids:#0EA5A4;
    --accent:#FF4D1F; --green:#10B981; --green-soft:#ECFDF5;
    --warn:#F59E0B; --warn-soft:#FEF3C7;
    --last:#E11D48; --last-soft:#FFE4E6;
    --barcode:#7C3AED; --barcode-soft:#F3E8FF;
  }
  /* 다크모드 색상 */
  :root.dark-mode {
    --bg: #121212; --surface: #1E1E1E;
    --ink: #F3F4F6; --ink-2: #9CA3AF; --muted: #6B7280;
    --line: #374151;
    --green-soft: #064E3B; --warn-soft: #78350F; --last-soft: #831843; --barcode-soft: #4C1D95;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); color:var(--ink); transition: background 0.2s, color 0.2s; }
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:"tnum","zero"; letter-spacing:-.005em; }
  .tnum{ font-variant-numeric:tabular-nums; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:0 1px 0 rgba(10,10,10,.02); }
  .card-hover{ transition:transform .08s ease,box-shadow .12s ease,border-color .12s ease; }
  .card-hover:hover{ transform:translateY(-1px); border-color:#0A0A0A; }
  .hairline{ border:1px solid var(--line); border-radius:10px; }
  .ipt{ border:1px solid var(--line); background:var(--surface); padding:.6rem .8rem; border-radius:10px; font-weight:600; color:var(--ink); }
  .brutal{ border:2px solid var(--ink); border-radius:10px; box-shadow:3px 3px 0 0 var(--ink); transition:transform .06s ease; }
  .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); font-weight:600; font-size:.82rem; cursor:pointer; }
  .chip[data-active="1"]{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .badge{ display:inline-flex; align-items:center; gap:.3rem; padding:.18rem .5rem; border-radius:6px; font-size:.72rem; font-weight:700; border:1px solid transparent; }
  .badge-men{ background:#EFF4FF; color:var(--men); border-color:#DBE6FF; }
  .badge-women{ background:#FCE7F3; color:var(--women); border-color:#FBCFE8; }
  .badge-uni{ background:#F4F4F4; color:var(--uni); border-color:#E5E5E5; }
  .badge-cat{ background:#0A0A0A; color:#fff; }
  .badge-brand{ background:#FAF6EB; color:#3D3D3D; border-color:var(--line); }
  .size-cell{ position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; padding:.5rem .35rem; min-height:54px; border:1px solid var(--line); }
  .size-cell .sz{ font-size:.7rem; font-weight:700; color:var(--muted); }
  .size-cell .qty{ font-size:1.15rem; font-weight:800; color:var(--ink); }
  .size-cell.zero{ opacity:0.4; }
  .size-cell.last{ background:var(--last-soft); border-color:#FDA4AF; } .size-cell.last .qty{ color:var(--last); }
  .loc{ margin-top:auto; display:flex; align-items:center; gap:.55rem; padding:.5rem .7rem; border-radius:10px; border:1px solid var(--line); font-size:.78rem; flex-wrap:wrap; }
  .loc-item{ display:inline-flex; align-items:center; gap:.3rem; font-weight:600; color:var(--ink-2); }
  .loc-item .dot{ width:.4rem; height:.4rem; border-radius:99px; background:var(--muted); }
  .loc-item.has .dot{ background:var(--green); }
  .modal-backdrop{ background:rgba(10,10,10,.55); backdrop-filter:blur(2px); }
  .copyable{ display:inline-flex; align-items:center; gap:.25rem; font-size:.95rem; font-weight:800; padding:.3rem .6rem; border:1.5px solid var(--line); border-radius:8px; background:var(--surface); cursor:pointer; }
  .fav-btn { font-size:1.2rem; cursor:pointer; color:var(--warn); transition:transform 0.1s; }
  .fav-btn:active { transform:scale(1.2); }

  /* 쇼룸 모드 활성화 시 내부 정보 숨김 */
  body.showroom-mode .loc,
  body.showroom-mode .callout,
  body.showroom-mode .badge-barcode,
  body.showroom-mode .delta-badge,
  body.showroom-mode .urgent-badge,
  body.showroom-mode #statBusan { display: none !important; }
  body.showroom-mode .detail-grid table td:nth-child(3),
  body.showroom-mode .detail-grid table td:nth-child(4),
  body.showroom-mode .detail-grid table th:nth-child(3),
  body.showroom-mode .detail-grid table th:nth-child(4) { display: none !important; }
</style>
</head>
<body class="min-h-screen">

<div id="viewerGate" class="hidden fixed inset-0 z-60 bg-[color:var(--bg)] flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-[color:var(--surface)] border-2 border-[color:var(--ink)] rounded-2xl p-6 text-center shadow-[6px_6px_0_0_var(--ink)]">
    <svg class="h-16 mx-auto mb-3" viewBox="0 0 649 250" fill="currentColor"><use href="#rcm-logo"/></svg>
    <div class="mono text-[10px] tracking-[.18em] text-[color:var(--muted)]">HAEUNDAE · INVENTORY</div>
    <h2 class="text-lg font-extrabold mt-1">직원 로그인</h2>
    <div class="mt-4 flex gap-2">
      <input id="viewerPwdInput" type="password" class="ipt w-full mono text-base" placeholder="비밀번호" />
      <button id="viewerPwdGo" class="brutal mono font-black px-4 bg-[color:var(--ink)] text-white">열기</button>
    </div>
    <div id="viewerPwdMsg" class="mt-2 mono text-xs text-[color:var(--accent)]"></div>
  </div>
</div>

<header class="sticky top-0 z-30 no-print" style="background:var(--bg); border-bottom:1px solid var(--line);">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <svg class="block h-[38px] w-auto" viewBox="0 0 649 250" fill="currentColor"><use href="#rcm-logo"/></svg>
      <div class="min-w-0 leading-tight">
        <div class="mono text-[10px] tracking-[.18em] text-[color:var(--muted)]">HAEUNDAE · INVENTORY</div>
        <h1 class="text-base sm:text-lg font-extrabold truncate">해운대 재고조회시스템</h1>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="copyCartBtn" class="chip mono text-[11px] hidden" style="background:var(--accent); color:#fff; border:none;"><i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> 리스트 복사</button>
      <button id="showroomBtn" class="chip mono text-[11px]" title="고객 대면용 쇼룸 모드"><i data-lucide="eye" class="w-3.5 h-3.5"></i>쇼룸</button>
      <button id="darkModeBtn" class="chip mono text-[11px]" title="다크모드 토글">🌙</button>
      <span id="syncStatus" data-kind="loading" class="hidden md:inline-flex chip mono text-[11px]">동기화 대기</span>
      <button id="refreshBtn" class="chip mono text-xs" title="새로고침"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
      <button id="adminBtn" class="brutal mono font-black px-3 py-2 text-sm bg-[color:var(--surface)]"><i data-lucide="lock" class="w-4 h-4 inline-block -mt-0.5"></i> ADMIN</button>
    </div>
  </div>
</header>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 grid grid-cols-2 lg:grid-cols-4 gap-3">
  <div class="card p-3"><div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)]">TOTAL ITEMS</div><div id="statItems" class="mt-1 text-2xl font-black tnum">0</div></div>
  <div class="card p-3"><div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)]">BUSAN STOCK</div><div id="statBusan" class="mt-1 text-2xl font-black tnum text-[color:var(--accent)]">0</div></div>
  <div class="card p-3"><div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)]">CATEGORY</div>
    <div class="mt-1 text-sm font-bold flex flex-wrap gap-1.5"><span class="badge badge-cat">신발</span><span class="badge badge-cat">의류</span><span class="badge badge-cat">용품</span></div>
  </div>
  <div class="card p-3 min-w-0"><div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)]">DATA SOURCE</div><div id="statSrc" class="mt-1 text-sm font-bold truncate">—</div></div>
</section>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-4">
  <div class="card p-3 sm:p-4">
    <div class="relative">
      <i data-lucide="search" class="w-5 h-5 absolute left-3.5 top-1/2 -translate-y-1/2 text-[color:var(--muted)]"></i>
      <input id="q" type="search" autocomplete="off" placeholder="검색어 입력" class="ipt w-full pl-11 pr-12 py-3 text-base font-bold" />
      <button id="clearQ" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-[color:var(--muted)]"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="filterDetails" class="mt-3 grid gap-3" style="grid-template-columns:1fr;">
      <div class="flex items-start gap-2 flex-wrap">
        <span class="text-[11px] font-bold text-[color:var(--muted)] shrink-0 mt-1.5 w-12">카테고리</span>
        <div class="flex items-center gap-1.5 flex-wrap">
          <button class="chip" data-cat="ALL" data-active="1">전체</button>
          <button class="chip" data-cat="신발">신발</button>
          <button class="chip" data-cat="의류">의류</button>
          <button class="chip" data-cat="용품">용품</button>
        </div>
      </div>
      <div class="flex items-start gap-2 flex-wrap">
        <span class="text-[11px] font-bold text-[color:var(--muted)] shrink-0 mt-1.5 w-12">성별</span>
        <div class="flex items-center gap-1.5 flex-wrap">
          <button class="chip" data-gender="ALL" data-active="1">전체</button>
          <button class="chip" data-gender="M">남성</button>
          <button class="chip" data-gender="W">여성</button>
          <button class="chip" data-gender="U">공용</button>
        </div>
      </div>
      <div class="flex items-start gap-2 flex-wrap">
        <span class="text-[11px] font-bold text-[color:var(--muted)] shrink-0 mt-1.5 w-12">필터</span>
        <div class="flex items-center gap-1.5 flex-wrap">
          <button class="chip" data-fav="1">★ 즐겨찾기</button>
          <button class="chip" data-stock="1">재고있음</button>
          <button class="chip" data-other="1">타지점 가능</button>
          <button class="chip" data-last="1">라스트피스</button>
          <button id="resetAll" class="chip" style="color:var(--accent); border-color:var(--accent)">전체 초기화</button>
        </div>
      </div>
      <div class="flex items-start gap-2 flex-wrap">
        <span class="text-[11px] font-bold text-[color:var(--muted)] shrink-0 mt-1.5 w-12">브랜드</span>
        <div id="brandChips" class="flex flex-wrap items-center gap-1.5 py-0.5 min-w-0 flex-1">
          <button class="chip" data-brand="ALL" data-active="1">전체</button>
        </div>
      </div>
    </div>
    <div id="filterSummary" class="mt-3 mono text-[12px] text-[color:var(--ink-2)]"></div>
  </div>
</section>

<main class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 mb-6">
  <div id="emptyState" class="card p-8 sm:p-12 text-center">
    <h2 class="text-xl sm:text-2xl font-extrabold">데이터 없음</h2>
    <p class="mt-2 text-sm text-[color:var(--ink-2)]">관리자 업로드가 필요합니다.</p>
  </div>
  <div id="results" class="hidden">
    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
    <div id="moreWrap" class="mt-5 flex justify-center"><button id="moreBtn" class="brutal mono font-black px-4 py-2.5 text-sm hidden bg-[color:var(--surface)]">더 보기 (+60)</button></div>
    <div id="noMatch" class="hidden card p-8 text-center text-xl font-black">NO MATCH</div>
  </div>
</main>

<div id="detailModal" class="hidden fixed inset-0 z-40 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 grid place-items-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[90vh] overflow-auto">
      <div class="flex items-start justify-between gap-3">
        <div id="detailHead" class="min-w-0 w-full"></div>
        <button id="closeDetail" class="hairline px-2 py-1.5 hover:bg-[color:var(--bg)]"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div id="detailBody" class="mt-4"></div>
      
      <div id="cartUI" class="mt-4 p-3 rounded-lg border border-[color:var(--line)] bg-[color:var(--bg)]">
        <div class="text-xs font-bold text-[color:var(--muted)] mb-2">🛒 타지점/물류 이동 요청 (장바구니 담기)</div>
        <div class="flex gap-2 items-center">
            <select id="cartSize" class="ipt py-1.5 text-sm flex-1"></select>
            <input type="number" id="cartQty" class="ipt w-16 py-1.5 text-center" value="1" min="1">
            <button id="addCartBtn" class="brutal px-3 py-1.5 text-sm font-black bg-[color:var(--ink)] text-white">담기</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="adminModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 grid place-items-center p-3">
    <div class="card w-full max-w-lg p-5 sm:p-6 max-h-[90vh] overflow-auto">
      <div class="flex justify-between mb-4"><h3 class="text-xl font-extrabold">ADMIN</h3><button id="closeAdmin"><i data-lucide="x"></i></button></div>
      <div id="authPanel">
        <input id="pwd" type="password" class="ipt w-full mono text-lg mb-2" placeholder="비밀번호" />
        <button id="pwdGo" class="brutal w-full py-2 bg-[color:var(--ink)] text-white font-black">UNLOCK</button>
        <div id="pwdMsg" class="mt-2 text-xs text-[color:var(--accent)]"></div>
      </div>
      <div id="uploadPanel" class="hidden">
        <button id="openSettings" class="hairline px-3 py-1 mb-3 text-xs">설정 변경</button>
        <div id="drop" class="hairline p-8 text-center cursor-pointer bg-[color:var(--bg)] border-dashed border-2">
          <div class="font-extrabold">엑셀 파일 클릭 또는 드래그</div>
          <input id="file" type="file" class="hidden" accept=".xlsx,.xls,.csv" />
        </div>
        <div id="parseMsg" class="mt-3 text-sm font-bold"></div>
      </div>
      <div id="settingsPanel" class="hidden">
        <input id="ghOwner" class="ipt w-full mb-2" placeholder="GitHub 사용자명" />
        <input id="ghRepo" class="ipt w-full mb-2" placeholder="저장소 이름" />
        <input id="ghBranch" class="ipt w-full mb-2" value="main" />
        <input id="ghPat" type="password" class="ipt w-full mb-4" placeholder="PAT 토큰" />
        <button id="ghSave" class="brutal w-full py-2 bg-[color:var(--ink)] text-white font-black">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
<script src="./images.js"></script>
</body>
</html>
