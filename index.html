<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RACEMENT 해운대 · 재고조회시스템</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FAF8F2; --surface:#FFFFFF;
    --ink:#0A0A0A; --ink-2:#3D3D3D; --muted:#8A8A8A;
    --line:#E8E3D5; --accent:#E11D48; 
  }
  :root.dark-mode {
    --bg: #121212; --surface: #1E1E1E; --ink: #F3F4F6; --ink-2: #9CA3AF; --muted: #6B7280; --line: #374151; --accent:#F43F5E;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); color:var(--ink); transition: background 0.2s, color 0.2s;}
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:"tnum","zero"; letter-spacing:-.005em; }
  .tnum{ font-variant-numeric:tabular-nums; }
  
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; position:relative; }
  .card-hover:hover{ border-color:#0A0A0A; }
  
  .ipt{ border:1px solid var(--line); background:var(--surface); padding:.6rem .8rem; border-radius:10px; color:var(--ink); font-weight:600;}
  .brutal{ border:2px solid var(--ink); border-radius:10px; box-shadow:3px 3px 0 0 var(--ink); }
  .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); font-weight:600; font-size:.82rem; cursor:pointer; }
  .chip[data-active="1"]{ background:var(--ink); color:#fff; border-color:var(--ink); }
  
  .loc-simple { font-size: 13px; color: #666; margin-top: auto; padding-top:12px; border-top: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .loc-simple b { font-weight: 700; color: var(--ink); }
  .price-clean { font-family: sans-serif; font-weight: 600; color: var(--ink); font-size: 15px; letter-spacing: -0.01em; }
  
  .size-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; border-radius: 8px; background: #FFFFFF; border: 1px solid #E0E0E0; color: #333333; }
  body.dark-mode .size-cell { background: #1E1E1E; border-color: #374151; color: #F3F4F6; }
  .size-cell .sz { font-size: 0.75rem; font-weight: 600; color: #666; }
  body.dark-mode .size-cell .sz { color: #9CA3AF; }
  .size-cell .qty { font-size: 1.05rem; font-weight: 800; }
  
  .size-cell.zero { background: #F5F5F5; border-color: #EEEEEE; color: #BDBDBD; }
  body.dark-mode .size-cell.zero { background: #121212; border-color: #1F2937; color: #4B5563; }
  .size-cell.zero .qty, .size-cell.zero .sz { color: inherit; text-decoration: line-through; }
  
  .size-cell.danger { background: #FEF2F2; border-color: #FECDD3; color: #E11D48; }
  body.dark-mode .size-cell.danger { background: #4c0519; border-color: #881337; color: #fecdd3; }
  .size-cell.danger .qty, .size-cell.danger .sz { color: inherit; }

  .size-cell.warn { background: #FFF7ED; border-color: #FED7AA; color: #D97706; }
  body.dark-mode .size-cell.warn { background: #451a03; border-color: #78350f; color: #fde68a; }
  .size-cell.warn .qty, .size-cell.warn .sz { color: inherit; }

  .copyable { cursor: pointer; transition: opacity 0.1s; display:inline-flex; align-items:center; gap:4px; padding: 2px 6px -ml-1; border-radius: 6px; }
  .copyable:active { opacity: 0.5; background: #eee; }
  .copyable:hover { color: #2563EB; background: #f0f4ff; }
  
  /* 즐겨찾기 북마크 아이콘으로 크기 키움 */
  .fav-btn { padding: 8px; border-radius: 8px; color: #A1A1AA; transition: all 0.2s; cursor:pointer; }
  .fav-btn:hover { background: #F3F4F6; color: #111; }
  .fav-btn[data-active="1"] { color: var(--ink); fill: var(--ink); }
  
  .modal-backdrop{ background:rgba(10,10,10,.55); backdrop-filter:blur(2px); }
  
  /* 쇼룸 모드 켤 때 메모 가리기 추가 */
  body.showroom-mode .real-qty { display: none !important; }
  body.showroom-mode .showroom-qty { display: inline !important; }
  body.showroom-mode .loc-simple { display: none !important; }
  body.showroom-mode .showroom-hide { display: none !important; }
  body.showroom-mode .detail-grid table th:nth-child(3),
  body.showroom-mode .detail-grid table td:nth-child(3),
  body.showroom-mode .detail-grid table th:nth-child(4),
  body.showroom-mode .detail-grid table td:nth-child(4) { display: none !important; }

  .logo-symbol{ display:block; height:38px; width:auto; }
  .logo-symbol-lg{ display:block; height:64px; width:auto; margin:0 auto; }
</style>
</head>
<body class="min-h-screen pb-20">

<header class="sticky top-0 z-30 no-print" style="background:var(--bg); border-bottom:1px solid var(--line);">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <svg class="logo-symbol" viewBox="0 0 649 250" fill="currentColor" aria-label="RACEMENT"><use href="#rcm-logo"/></svg>
      <div class="min-w-0 leading-tight">
        <div class="mono text-[10px] tracking-[.18em] text-[color:var(--muted)]">HAEUNDAE · INVENTORY</div>
        <h1 class="text-base sm:text-lg font-extrabold truncate">해운대 재고조회</h1>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="allMemosBtn" class="chip mono text-[11px] bg-yellow-50 text-yellow-700 border-yellow-200"><i data-lucide="bell-ring" class="w-3.5 h-3.5"></i> 오늘의 메모</button>
      <button id="showroomBtn" class="chip mono text-[11px]"><i data-lucide="eye" class="w-3.5 h-3.5"></i>쇼룸</button>
      <button id="darkModeBtn" class="chip mono text-[11px]">🌙</button>
      <span id="_syncBadge" style="font-size:10px;color:#6366f1;font-weight:700;opacity:0.5;transition:opacity 1s;white-space:nowrap;"></span>
      <button id="refreshBtn" class="chip mono text-xs"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
      <button id="adminBtn" class="brutal mono font-black px-3 py-2 text-sm bg-[color:var(--surface)]">ADMIN</button>
    </div>
  </div>
</header>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-3 flex flex-col md:flex-row gap-3 w-full">
    <div class="card p-3 flex flex-col justify-center min-w-[110px] shrink-0">
        <div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)] mb-1">TOTAL ITEMS</div>
        <div id="statItems" class="text-2xl font-black tnum">0</div>
    </div>
    
    <div class="card p-3 flex flex-col justify-center min-w-[110px] shrink-0">
        <div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)] mb-1">BUSAN STOCK</div>
        <div id="statBusan" class="text-2xl font-black tnum" style="color:var(--accent)">0</div>
    </div>

    <div class="card p-3 flex flex-col justify-center min-w-[130px] shrink-0">
        <div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)] mb-1">CATEGORY</div>
        <div class="mt-1 text-sm font-bold text-gray-600 flex gap-2"><span>신발</span><span>의류</span><span>용품</span></div>
    </div>

    <div class="card p-3 flex flex-col justify-center flex-1 min-w-[280px]">
        <div class="mono text-[10px] tracking-[.16em] text-[color:var(--muted)] mb-1.5">DATA SOURCE</div>
        <div id="statSrc" class="w-full">
            <span class="text-xs font-bold text-gray-400">데이터 로딩중...</span>
        </div>
    </div>
</section>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-3">
  <div class="card p-3">
    <!-- 검색바 + 액션버튼 한 줄 -->
    <div class="flex gap-2 items-center">
      <div class="relative flex-1">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-[color:var(--muted)]"></i>
        <input id="q" type="search" placeholder="품명, 품번 검색 (초성 지원)" class="ipt w-full pl-9 pr-10 font-bold text-sm py-2" />
        <button id="clearQ" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-[color:var(--muted)]"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <!-- 액션버튼 (JS가 채움) -->
      <div id="actionBtnsWrap" class="flex gap-1.5 items-center shrink-0"></div>
    </div>
    <div id="recentSearches" class="hidden flex gap-1.5 mt-1.5 overflow-x-auto pb-1 items-center no-scrollbar"></div>

    <div id="filterDetails" class="mt-2 flex flex-col gap-1.5">
      <!-- 카테고리 + 성별 한 줄 -->
      <div class="flex flex-wrap gap-1.5 items-center">
        <span class="text-[10px] font-bold text-[color:var(--muted)] w-10 shrink-0">카테고리</span>
        <button class="chip" data-cat="ALL" data-active="1">전체</button>
        <button class="chip" data-cat="신발">신발</button>
        <button class="chip" data-cat="의류">의류</button>
        <button class="chip" data-cat="용품">용품</button>
        <span class="text-[10px] font-bold text-[color:var(--muted)] ml-2 shrink-0">성별</span>
        <button class="chip" data-gender="ALL" data-active="1">전체</button>
        <button class="chip" data-gender="M">남성</button>
        <button class="chip" data-gender="W">여성</button>
        <button class="chip" data-gender="U">공용</button>
      </div>
      <!-- 필터 + 정렬 + 초기화 한 줄 -->
      <div class="flex flex-wrap gap-1.5 items-center">
        <span class="text-[10px] font-bold text-[color:var(--muted)] w-10 shrink-0">필터</span>
        <button class="chip" data-fav="1">🔖 즐겨찾기</button>
        <button class="chip" data-stock="1">재고있음</button>
        <button class="chip" data-memo="1">📝 메모있음</button>
        <button class="chip" data-salesspeed="hot">🔥 핫셀러</button>
        <button class="chip" data-salesspeed="normal">📈 보통</button>
        <button class="chip" data-salesspeed="slow">📦 저조</button>
        <button class="chip" data-rtchance="1">🔄 RT 추천</button>
        <select id="sortSel" class="ipt py-1 px-2.5 text-xs ml-1 shrink-0">
          <option value="default">기본 정렬 (분류·재고순)</option>
          <option value="brand">브랜드·품명순</option>
          <option value="name">품명순</option>
          <option value="stock">부산재고순</option>
          <option value="priceAsc">가격 낮은 순</option>
          <option value="priceDesc">가격 높은 순</option>
        </select>
        <button id="resetAll" class="ml-auto p-1.5 rounded-lg text-[color:var(--accent)] hover:bg-red-50 transition-colors shrink-0" title="전체 초기화">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
        </button>
      </div>
      <!-- 브랜드 검색 + 정렬 + 중복체크 -->
      <div class="flex gap-1.5 items-center">
        <span class="text-[10px] font-bold text-[color:var(--muted)] w-10 shrink-0">브랜드</span>
        <div class="relative w-32 shrink-0">
          <i data-lucide="search" class="w-3 h-3 absolute left-2 top-1/2 -translate-y-1/2 text-[color:var(--muted)] pointer-events-none"></i>
          <input id="brandSearch" type="search" placeholder="브랜드 검색..." class="ipt text-xs py-1 pl-6 pr-2 w-full">
        </div>
        <div class="flex shrink-0 text-[10px] font-bold rounded-lg overflow-hidden border border-[color:var(--line)]">
          <button id="brandSortPop" class="brand-sort-btn px-2.5 py-1.5 transition-colors" data-active="1">인기순</button>
          <button id="brandSortAlpha" class="brand-sort-btn px-2.5 py-1.5 transition-colors border-l border-[color:var(--line)]" data-active="0">가나다순</button>
        </div>
      </div>
      <!-- 브랜드 칩 (최대 3줄 스크롤) -->
      <div id="brandChips" class="flex flex-wrap gap-1 pl-[2.875rem]">
        <button class="chip" data-brand="ALL" data-active="1">전체</button>
      </div>
    </div>
  </div>
</section>

<main id="results" class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 mb-6">
  <div id="emptyState" class="card p-12 text-center hidden">
    <div class="text-xl font-black mb-2">데이터 없음</div>
    <div class="text-sm text-gray-500">우측 상단 ADMIN에서 엑셀을 업로드해주세요.</div>
  </div>
  
  <div id="noMatch" class="hidden card p-10 text-center">
      <div class="text-xl font-black">NO MATCH</div>
      <div class="text-gray-500 text-sm mt-1">조건에 맞는 상품이 없습니다.</div>
  </div>
  
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
  
  <div id="moreWrap" class="mt-5 flex justify-center hidden">
      <button id="moreBtn" class="brutal px-6 py-2.5 font-black bg-[color:var(--surface)] text-[color:var(--ink)]">더 보기 (+60)</button>
  </div>
</main>

<div id="allMemosModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[80vh] flex flex-col relative bg-[color:var(--surface)]">
      <button id="closeAllMemos" class="absolute top-4 right-4 p-2 z-10"><i data-lucide="x"></i></button>
      <h3 class="text-xl font-black mb-1">🔔 오늘의 직원 메모 모아보기</h3>
      <div class="text-xs text-gray-500 mb-4">현재 등록된 모든 이슈를 한눈에 파악합니다.</div>
      <div id="allMemosList" class="flex-1 overflow-y-auto border-y py-2 mb-2 space-y-2"></div>
    </div>
  </div>
</div>

<div id="detailModal" class="hidden fixed inset-0 z-40 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[90vh] overflow-auto relative">
      <button id="closeDetail" class="absolute top-4 right-4 p-2 z-10"><i data-lucide="x"></i></button>
      <div id="detailHead"></div>
      
      <div id="detailMemosWrap" class="showroom-hide mt-3 mb-2"></div>

      <div id="detailBody"></div>
      
      <div id="memoUI" class="showroom-hide mt-3 p-3 rounded-lg border bg-[color:var(--bg)]">
        <div class="text-xs font-bold mb-2">📝 직원 메모 남기기</div>
        <div class="flex gap-2 mb-2">
            <select id="memoStaff" class="ipt w-24 text-xs py-1.5">
                <option value="" disabled selected>직원선택</option>
                <option value="종훈">종훈</option>
                <option value="기태">기태</option>
                <option value="민정">민정</option>
                <option value="경준">경준</option>
                <option value="서영">서영</option>
            </select>
            <select id="memoTag" class="ipt flex-1 text-xs py-1.5">
                <option value="DP필요">🚨 DP필요</option>
                <option value="고객예약">👤 고객예약</option>
                <option value="기타이슈">💡 기타이슈</option>
            </select>
        </div>
        <div class="flex gap-2">
            <input type="text" id="memoText" class="ipt flex-1 text-xs py-1.5" placeholder="메모 내용 입력">
            <button id="addMemoBtn" class="brutal px-3 bg-blue-600 text-white font-black py-1.5 text-xs">저장</button>
        </div>
        <div id="memoMsg" class="mt-1 text-[11px] font-bold text-gray-600"></div>
      </div>
    </div>
  </div>
</div>

<div id="adminModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-lg p-6 relative">
      <button id="closeAdmin" class="absolute top-4 right-4 p-2 z-10"><i data-lucide="x"></i></button>
      <svg class="logo-symbol-lg mb-3 mx-auto" viewBox="0 0 649 250" fill="currentColor"><use href="#rcm-logo"/></svg>
      <h3 class="text-xl font-black mb-4 text-center">ADMIN PANEL</h3>
      
      <div id="authPanel">
        <input id="pwd" type="password" class="ipt w-full mb-2 text-center tracking-widest" placeholder="비밀번호 입력" />
        <button id="pwdGo" class="brutal w-full py-2 bg-black text-white font-black">UNLOCK</button>
      </div>
      
      <div id="uploadPanel" class="hidden">
        <button id="openSettings" class="text-xs mb-3 border px-2 py-1 bg-gray-100 rounded">⚙️ 깃허브 설정 / 토큰 관리</button>
        <div id="drop" class="border-2 border-dashed border-gray-400 p-10 text-center cursor-pointer bg-gray-50 dark:bg-gray-800 rounded-xl">
            <i data-lucide="upload-cloud" class="w-8 h-8 mx-auto text-gray-400 mb-2"></i>
            <div class="font-bold">엑셀 파일 클릭 또는 드래그</div>
            <div class="text-xs text-gray-500 mt-1">업로드 시 재고 변동량 자동 계산</div>
        </div>
        <input id="file" type="file" class="hidden" accept=".xlsx,.xls,.csv" />
      </div>

      <div id="settingsPanel" class="hidden">
        <button id="backToUpload" class="text-xs mb-3 border px-2 py-1 text-gray-600 hover:bg-gray-100">← 이전 화면으로</button>
        <input id="ghOwner" class="ipt w-full mb-2" placeholder="GitHub 사용자명" />
        <input id="ghRepo" class="ipt w-full mb-2" placeholder="저장소 이름" />
        <input id="ghPat" type="password" class="ipt w-full mb-4" placeholder="PAT 토큰" />
        <button id="ghSave" class="brutal w-full py-2 bg-black text-white font-black">설정 저장</button>
      </div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
