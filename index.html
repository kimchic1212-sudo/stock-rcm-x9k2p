<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RACEMENT 해운대 · 재고조회시스템</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:#FAF8F2; --surface:#FFFFFF;
    --ink:#0A0A0A; --ink-2:#3D3D3D; --muted:#8A8A8A;
    --line:#E8E3D5; --accent:#FF4D1F; 
  }
  :root.dark-mode {
    --bg: #121212; --surface: #1E1E1E; --ink: #F3F4F6; --ink-2: #9CA3AF; --muted: #6B7280; --line: #374151;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); color:var(--ink); transition: background 0.2s, color 0.2s;}
  body{ font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; font-feature-settings:"tnum","zero"; letter-spacing:-.005em; }
  .tnum{ font-variant-numeric:tabular-nums; }
  
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; position:relative; }
  .card-hover:hover{ border-color:#0A0A0A; }
  
  .ipt{ border:1px solid var(--line); background:var(--surface); padding:.6rem .8rem; border-radius:10px; color:var(--ink); font-weight:600;}
  .brutal{ border:2px solid var(--ink); border-radius:10px; box-shadow:3px 3px 0 0 var(--ink); }
  .chip{ display:inline-flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); font-weight:600; font-size:.82rem; cursor:pointer; }
  .chip[data-active="1"]{ background:var(--ink); color:#fff; border-color:var(--ink); }
  
  /* UX 개편: Boxless 썸네일 */
  .boxless-img { position: absolute; top: 16px; right: 16px; width: 60px; height: 60px; object-fit: contain; background: transparent; pointer-events: none; }
  
  /* UX 개편: 텍스트 태그 및 가독성 폰트 */
  .tags-text { font-size: 12px; color: #888; font-weight: 600; margin-bottom: 4px; display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
  .loc-simple { font-size: 13px; color: #666; margin-top: auto; padding-top:12px; border-top: 1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .loc-simple b { font-weight: 700; color: var(--ink); }
  .price-clean { font-family: sans-serif; font-weight: 600; color: var(--ink); font-size: 15px; letter-spacing: -0.01em; }
  
  /* UX 개편: 터치 타겟 보장 44x44 그리드 */
  .size-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; border-radius: 8px; background: #FFFFFF; border: 1px solid #E0E0E0; color: #333333; }
  body.dark-mode .size-cell { background: #1E1E1E; border-color: #374151; color: #F3F4F6; }
  .size-cell .sz { font-size: 0.75rem; font-weight: 600; color: #666; }
  body.dark-mode .size-cell .sz { color: #9CA3AF; }
  .size-cell .qty { font-size: 1.05rem; font-weight: 800; }
  
  /* 품절 (0개) - 눈에 안 띄게 */
  .size-cell.zero { background: #F5F5F5; border-color: #EEEEEE; color: #BDBDBD; }
  body.dark-mode .size-cell.zero { background: #121212; border-color: #1F2937; color: #4B5563; }
  .size-cell.zero .qty, .size-cell.zero .sz { color: inherit; text-decoration: line-through; }
  
  /* 소량 재고 (1~2개) - 뱃지 없이 붉은 배경으로 즉각 인지 */
  .size-cell.low { background: #FFEBEE; border-color: #FFCDD2; color: #D32F2F; }
  body.dark-mode .size-cell.low { background: #451a1e; border-color: #7f1d1d; color: #fca5a5; }
  .size-cell.low .qty, .size-cell.low .sz { color: inherit; }

  .copyable { cursor: pointer; transition: opacity 0.1s; display:inline-block; }
  .copyable:active { opacity: 0.5; }
  
  .modal-backdrop{ background:rgba(10,10,10,.55); backdrop-filter:blur(2px); }
  
  /* 쇼룸 모드 O/X */
  body.showroom-mode .real-qty { display: none !important; }
  body.showroom-mode .showroom-qty { display: inline !important; }
  body.showroom-mode .loc-simple { display: none !important; }
  body.showroom-mode .detail-grid table th:nth-child(3),
  body.showroom-mode .detail-grid table td:nth-child(3),
  body.showroom-mode .detail-grid table th:nth-child(4),
  body.showroom-mode .detail-grid table td:nth-child(4) { display: none !important; }
</style>
</head>
<body class="min-h-screen pb-20">

<header class="sticky top-0 z-30 no-print" style="background:var(--bg); border-bottom:1px solid var(--line);">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <div class="min-w-0 leading-tight">
        <div class="mono text-[10px] tracking-[.18em] text-[color:var(--muted)]">HAEUNDAE · INVENTORY</div>
        <h1 class="text-base sm:text-lg font-extrabold truncate">해운대 재고조회</h1>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="cartBtn" class="chip mono text-[11px] hidden" style="background:var(--accent); color:#fff; border:none;"><i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> 요청함 (<span id="cartCount">0</span>)</button>
      <button id="showroomBtn" class="chip mono text-[11px]"><i data-lucide="eye" class="w-3.5 h-3.5"></i>쇼룸</button>
      <button id="darkModeBtn" class="chip mono text-[11px]">🌙</button>
      <button id="refreshBtn" class="chip mono text-xs"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>
      <button id="adminBtn" class="brutal mono font-black px-3 py-2 text-sm bg-[color:var(--surface)]">ADMIN</button>
    </div>
  </div>
</header>

<section class="mx-auto max-w-7xl px-4 sm:px-6 mt-4">
  <div class="card p-3 sm:p-4">
    <div class="relative">
      <i data-lucide="search" class="w-5 h-5 absolute left-3.5 top-1/2 -translate-y-1/2 text-[color:var(--muted)]"></i>
      <input id="q" type="search" placeholder="품명, 품번 검색 (초성 지원)" class="ipt w-full pl-11 pr-12 font-bold" />
      <button id="clearQ" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-[color:var(--muted)]"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="recentSearches" class="hidden flex gap-1.5 mt-2 overflow-x-auto pb-1 items-center"></div>
    <div id="filterDetails" class="mt-3 flex flex-wrap gap-2">
      <button class="chip" data-cat="ALL" data-active="1">전체</button>
      <button class="chip" data-cat="신발">신발</button>
      <button class="chip" data-cat="의류">의류</button>
      <button class="chip" data-fav="1">★ 즐겨찾기</button>
      <button class="chip" data-stock="1">재고있음</button>
      <button id="resetAll" class="chip" style="color:var(--accent);">초기화</button>
      <div id="brandChips" class="flex flex-wrap gap-1.5"><button class="chip" data-brand="ALL" data-active="1">브랜드 전체</button></div>
    </div>
  </div>
</section>

<main id="results" class="mx-auto max-w-7xl px-4 sm:px-6 mt-4 mb-6">
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>
</main>

<div id="detailModal" class="hidden fixed inset-0 z-40 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[90vh] overflow-auto relative">
      <button id="closeDetail" class="absolute top-4 right-4 p-2 z-10"><i data-lucide="x"></i></button>
      <div id="detailHead"></div>
      <div id="detailBody"></div>
      
      <div id="cartUI" class="mt-4 p-3 rounded-lg border bg-[color:var(--bg)]">
        <div class="text-xs font-bold mb-2">🛒 타지점 이동 요청 담기</div>
        <div class="flex gap-2">
          <select id="cartSize" class="ipt flex-1 text-sm py-1.5"></select>
          <input type="number" id="cartQty" class="ipt w-16 text-center py-1.5" value="1" min="1">
          <button id="addCartBtn" class="brutal px-4 bg-black text-white font-black py-1.5 text-sm">담기</button>
        </div>
      </div>

      <div id="memoUI" class="mt-3 p-3 rounded-lg border bg-[color:var(--bg)]">
        <div class="text-xs font-bold mb-2">📝 직원 메모 남기기 (21시 일일보고 연동)</div>
        <div class="flex gap-2 mb-2">
            <input type="text" id="memoStaff" class="ipt w-24 text-xs py-1.5" placeholder="직원이름">
            <select id="memoTag" class="ipt flex-1 text-xs py-1.5">
                <option value="DP필요">🚨 DP필요</option>
                <option value="고객예약">👤 고객예약</option>
                <option value="기타이슈">💡 기타이슈</option>
            </select>
        </div>
        <div class="flex gap-2">
            <input type="text" id="memoText" class="ipt flex-1 text-xs py-1.5" placeholder="메모 내용 입력">
            <button id="addMemoBtn" class="brutal px-3 bg-blue-600 text-white font-black py-1.5 text-xs">저장</button>
        </div>
        <div id="memoMsg" class="mt-1 text-[11px] font-bold text-gray-600"></div>
      </div>
    </div>
  </div>
</div>

<div id="cartModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-2xl p-5 sm:p-6 max-h-[80vh] flex flex-col relative bg-[color:var(--surface)]">
      <button id="closeCart" class="absolute top-4 right-4 p-2 z-10"><i data-lucide="x"></i></button>
      <h3 class="text-xl font-black mb-4">🛒 이동 요청 목록</h3>
      <div id="cartList" class="flex-1 overflow-y-auto border-y py-2 mb-4"></div>
      <div class="flex gap-2">
        <button id="clearCart" class="chip" style="color:var(--accent);">전체 삭제</button>
        <button id="copyExcelBtn" class="brutal flex-1 py-3 bg-green-600 text-white font-black text-sm">엑셀용 리스트 복사</button>
      </div>
    </div>
  </div>
</div>

<div id="adminModal" class="hidden fixed inset-0 z-50 modal-backdrop no-print">
  <div class="modal-outer absolute inset-0 flex items-center justify-center p-3">
    <div class="card w-full max-w-lg p-6 relative">
      <button id="closeAdmin" class="absolute top-4 right-4 p-2"><i data-lucide="x"></i></button>
      <h3 class="text-xl font-black mb-4">ADMIN</h3>
      <div id="authPanel">
        <input id="pwd" type="password" class="ipt w-full mb-2" placeholder="비밀번호" />
        <button id="pwdGo" class="brutal w-full py-2 bg-black text-white font-black">UNLOCK</button>
      </div>
      <div id="uploadPanel" class="hidden">
        <button id="openSettings" class="text-xs mb-3 border px-2 py-1">설정 변경</button>
        <div id="drop" class="border-2 border-dashed p-10 text-center cursor-pointer bg-gray-50 dark:bg-gray-800">엑셀 파일 클릭/드래그 (업로드 시 변동량 자동계산)</div>
        <input id="file" type="file" class="hidden" accept=".xlsx,.xls,.csv" />
      </div>
      <div id="settingsPanel" class="hidden">
        <input id="ghOwner" class="ipt w-full mb-2" placeholder="GitHub 사용자명" />
        <input id="ghRepo" class="ipt w-full mb-2" placeholder="저장소 이름" />
        <input id="ghPat" type="password" class="ipt w-full mb-4" placeholder="PAT 토큰" />
        <button id="ghSave" class="brutal w-full py-2 bg-black text-white font-black">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="./app.js"></script>
<script src="./images.js"></script>
</body>
</html>
