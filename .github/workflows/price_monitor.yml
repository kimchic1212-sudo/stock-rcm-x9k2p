name: Price Monitor

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 KST 11:00 (UTC 02:00)
  workflow_dispatch:
    inputs:
      mode:
        description: 'summary = 전체 할인 현황 | changes = 변동분만'
        required: false
        default: 'changes'

jobs:
  check_prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run price report
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_MODE: ${{ github.event.inputs.mode || 'changes' }}
        run: node price_report.js

      - name: Save updated prices
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add prices.json
          git diff --staged --quiet || git commit -m "prices: $(date -u +%Y-%m-%d\ %H:%M)"
          git push
